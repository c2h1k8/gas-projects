name: Deploy to GAS

on:
  pull_request:
    # opened/synchronize/reopened: pushのみ（HEADプレビュー）
    # closed: マージ時のみ push + 本番 /exec デプロイ
    types: [opened, synchronize, reopened, closed]
  workflow_dispatch:
    inputs:
      all:
        description: '全プロジェクトを対象にする（ONなら個別選択は無視）'
        type: boolean
        default: true
      line-attendance:
        description: 'line-attendance'
        type: boolean
        default: false
      household-account:
        description: 'household-account'
        type: boolean
        default: false
      notion-checked-time:
        description: 'notion-checked-time'
        type: boolean
        default: false
      gmail-auto-delete:
        description: 'gmail-auto-delete'
        type: boolean
        default: false

# 同一ブランチの多重実行を防ぐ（後勝ち）
concurrency:
  group: gas-deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    # PRを「マージせず閉じた」場合は何もしない（それ以外は実行）
    if: >-
      github.event_name != 'pull_request'
      || github.event.action != 'closed'
      || github.event.pull_request.merged == true
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install clasp
        run: npm install -g @google/clasp@3.3.0

      - name: Write clasp credentials
        run: |
          if [ -z "${CLASPRC_JSON}" ]; then
            echo "::error::secrets.CLASPRC_JSON が未設定です。"
            exit 1
          fi
          printf '%s' "${CLASPRC_JSON}" > "${HOME}/.clasprc.json"
        env:
          CLASPRC_JSON: ${{ secrets.CLASPRC_JSON }}

      - name: Copy common files
        run: bash scripts/copy-common.sh

      # 手動実行のチェックボックス入力を対象プロジェクト文字列に変換
      - name: Resolve manual targets
        if: github.event_name == 'workflow_dispatch'
        run: |
          if [ "${{ inputs.all }}" = "true" ]; then
            echo "DISPATCH_PROJECTS=all" >> "$GITHUB_ENV"
          else
            sel=""
            [ "${{ inputs['line-attendance'] }}" = "true" ]   && sel="$sel line-attendance"
            [ "${{ inputs['household-account'] }}" = "true" ]  && sel="$sel household-account"
            [ "${{ inputs['notion-checked-time'] }}" = "true" ] && sel="$sel notion-checked-time"
            [ "${{ inputs['gmail-auto-delete'] }}" = "true" ]  && sel="$sel gmail-auto-delete"
            echo "DISPATCH_PROJECTS=$(echo $sel | xargs)" >> "$GITHUB_ENV"
          fi

      - name: Push to GAS
        run: bash scripts/ci-deploy.sh
        env:
          # IPv4/IPv6自動選択(Happy Eyeballs)がランナー↔Google API間で接続を
          # 途中切断し "Premature close" を起こすため無効化する。
          NODE_OPTIONS: --no-network-family-autoselection
          SCRIPT_IDS: ${{ secrets.CLASP_SCRIPT_IDS }}
          EVENT_NAME: ${{ github.event_name }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          GH_TOKEN: ${{ github.token }}
          # PRマージ時のみ本番 /exec デプロイまで実行
          DEPLOY: ${{ github.event_name == 'pull_request' && github.event.action == 'closed' && github.event.pull_request.merged == true }}
