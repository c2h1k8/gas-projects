name: Deploy to GAS

on:
  pull_request:
    types: [opened, synchronize, reopened]
  workflow_dispatch:
    inputs:
      projects:
        description: 'push対象プロジェクト（スペース区切り / all で全部）'
        required: true
        default: 'all'

# 同一ブランチの多重実行を防ぐ（後勝ち）
concurrency:
  group: gas-deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # PR差分の算出に全履歴が必要

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install clasp
        run: npm install -g @google/clasp@3.3.0

      - name: Write clasp credentials
        run: |
          if [ -z "${CLASPRC_JSON}" ]; then
            echo "::error::secrets.CLASPRC_JSON が未設定です。"
            exit 1
          fi
          printf '%s' "${CLASPRC_JSON}" > "${HOME}/.clasprc.json"
        env:
          CLASPRC_JSON: ${{ secrets.CLASPRC_JSON }}

      - name: Copy common files
        run: bash scripts/copy-common.sh

      - name: Push to GAS
        run: bash scripts/ci-deploy.sh
        env:
          SCRIPT_IDS: ${{ secrets.CLASP_SCRIPT_IDS }}
          EVENT_NAME: ${{ github.event_name }}
          DISPATCH_PROJECTS: ${{ github.event.inputs.projects }}
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
